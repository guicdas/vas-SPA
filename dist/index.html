  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<meta name="description" content="Listing of works about stuff" />
		<meta property="og:title" content="Vasco Ayala Serôdio" />
		<meta property="og:image" content="banner.jpg" />
		<title>Vasco Ayala Serôdio</title>
    <link rel="icon" id="favicon" href="banner.jpg" type="image/svg" />

	<style>
		:root {
			--color-primary: #1a1a1a;
			--color-secondary: #666;
			--color-accent: #0066ff;
			--color-border: #e0e0e0;
			--color-background: #ffffff;
			--spacing-sm: 1rem;
			--spacing-md: 1.5rem;
			--spacing-lg: 2rem;
			--spacing-xl: 3rem;
			--transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		}
	
		body	 {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
			background-color: var(--color-background);
			color: var(--color-primary);
			line-height: 1.6;
		}
	
		/* ==================== HOMEPAGE ==================== */
	
		.homepage {
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: start;
			justify-content: start;
			text-align: center;
			background: linear-gradient(135deg, #ffffff 0%, #f8f9fb 100%);
		}
	
		.home-title {
			position: absolute;
			top: 5vh;
			left:5vw;
			display: flex;
			flex-direction: column;

			.text {
				font-size: 2rem;
				font-weight: 700;
				transition: all 200ms ease;
				position: relative;
				margin-bottom: 0;
	
				&::after {
					content: "Serôdio";
					position: absolute;
					translate: 5% 1%;
					transition: all 170ms ease;
					background-color: white;
				}
				&.hidden::after {
					transform: translateX(-77%);
				}
			}
			
			
			.bar {
				position: relative;
				width: 170%;
				background-color: black;
				height: 2px;
				transition: all 250ms ease;

				&.hidden {
					height: 1px;
					width: 120%;
				}

				&.disappear {
					width: 0%;
					height: 0;
				}
			}

		}
		
		
		.links-list {
			margin-top: 38vh;
			display: flex;
			flex-direction: column;
		}
	
		.link-button {
			width: 40vw;
			white-space: nowrap;
			padding-top: 2vh;
			padding-bottom: 2vh;
			margin-left: 30vw;
			font-size: 1.1rem;
			font-weight: bold;
			color: hsl(0 0 25);
			border: none;
			cursor: pointer;
			background: transparent;
			border-radius: 8px;
			transition: all 180ms ease;
			text-align: left;
			
			&::before {
				content: "_";
				opacity: 0;
			}
		}
		
		.link-button:hover {
			font-weight: bolder;
			color: black;
			letter-spacing: 0.03rem;
			
			&::before {
				opacity: 1;
			}
		}

	
		/* ==================== CONTENT PAGE ==================== */
	
		.page-container {
			min-height: 100vh;
			background: linear-gradient(135deg, #ffffff 0%, #f8f9fb 100%);
			position: relative;
			font-family: 'Times New Roman', Times, serif;
		}
	
		.home-button {
			position: fixed;
			top: var(--spacing-lg);
			left: var(--spacing-lg);
			width: 48px;
			height: 48px;
			border-radius: 50%;
			background: var(--color-accent);
			color: white;
			border: none;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all var(--transition);
			box-shadow: 0 4px 12px rgba(0, 102, 255, 0.3);
			z-index: 100;
		}
	
		.home-button:hover {
			transform: scale(1.1);
			box-shadow: 0 6px 20px rgba(0, 102, 255, 0.4);
		}
	
		.home-button:active {
			transform: scale(0.95);
		}
	
		.home-button svg {
			width: 24px;
			height: 24px;
		}
	
		.article {
			max-width: 720px;
			margin: 0 auto;
			padding: var(--spacing-xl) var(--spacing-lg);
			padding-top: var(--spacing-xl);
		}
	
		.page-title {
			font-size: 2.5rem;
			font-weight: 700;
			margin-bottom: var(--spacing-lg);
			letter-spacing: -0.02em;
		}
	
		.page-content {
			display: flex;
			flex-direction: column;
			gap: var(--spacing-lg);
		}
	
		.text-block {
			font-size: 1.1rem;
			line-height: 1.8;
			color: var(--color-primary);
			text-indent: 3rem;
		}
	
		.image-block {
			margin: 0;
			border-radius: 8px;
			overflow: hidden;
			box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
		}
	
		.image-block img {
			width: 100%;
			height: auto;
			display: block;
		}
	</style>
